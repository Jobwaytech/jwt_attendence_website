services:
  - type: web
    name: authflow-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: USE_HTTPS
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: COMPANY_LATITUDE
        sync: false
      - key: COMPANY_LONGITUDE
        sync: false
      - key: ATTENDANCE_LOCATION_RADIUS_METERS
        value: "150"
      - key: FACE_MATCH_THRESHOLD
        value: "85"
