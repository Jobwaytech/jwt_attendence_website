[build]
  command = "npm --prefix backend install && npm --prefix frontend install && npm --prefix frontend run build"
  publish = "frontend/.next"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[plugins]]
  package = "@netlify/plugin-nextjs"
